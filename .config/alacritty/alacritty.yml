import:
- ~/.config/alacritty/themes/gruvbox-material.yaml

env:
  TERM: xterm-256color

window:
  opacity: 1.0
  padding:
    x: 0
    y: 0

# Font
font:
  # Normal (roman) font face
  normal:
    family: JetBrains Mono
    style: Bold

  bold:
    family: JetBrains Mono
    style: Extrabold

  italic:
    family: JetBrains Mono
    style: Bold Italic

  bold_italic:
    family: JetBrains Mono
    style: Extrabold Italic

  size: 9.0
